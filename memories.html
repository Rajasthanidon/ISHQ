<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <link rel="icon" type="image/x-icon" href="cute_ghost.png">
        <link rel="stylesheet" href="style_memories.css">
        <title>
            ISHQ
        </title>
    </head>
    <body>
       <div class="cont">
           <p id="para">
                Mein Kesa Lagta Hu
            </p>
        </div> 
            <div class="button" >
                <button id="ha">
                    Bahut Ache
                </button>
                <button  id="nahi">
                    Nahi Bataungi
                </button>
            </div>
            <div class="emoji">
                <img src="smiley.png" id="smiley" />
            </div>
            <script>
const haa = document.getElementById("ha");
const emoj = document.getElementById("smiley");

haa.addEventListener("mouseover",function (){
    emoj.src="smiley.png";
    emoj.style.visibility="visible";
});
haa.addEventListener("mouseout",function (){
    emoj.style.visibility="hidden";
});
const nahii = document.getElementById("nahi");
nahii.addEventListener("mouseover",function (){
    emoj.src="upset.png";
    emoj.style.visibility="visible";
});
nahii.addEventListener("mouseout",function (){
    emoj.style.visibility="hidden";
});
const pos = document.getElementById("nahi");
pos.addEventListener("click",function (){
    const x = Math.floor(Math.random()*695);
    const y = Math.floor(Math.random()*1505);
    pos.style.transform = `translate(${x}%, ${y}%)`;
});
</script>
    </body>
</html>
